# Walk every Settings row with the change key: typeface, type size, type
# weight, line spacing, orientation, and refresh policy each advance one
# step, then Back returns home.

[[steps]]
button = "Next"

[[steps]]
button = "Confirm"

[[steps]]
button = "Next"

[[steps]]
button = "Confirm"

[[steps]]
button = "Next"

[[steps]]
button = "Confirm"

[[steps]]
button = "Next"

[[steps]]
button = "Confirm"

[[steps]]
button = "Next"

[[steps]]
button = "Confirm"

[[steps]]
button = "Next"

[[steps]]
button = "Confirm"

[[steps]]
button = "Back"

[expect]
view = "Home"
selection = 0
font_family = "Merriweather"
font_size = "Large"
font_weight = "Heavy"
line_spacing = "Relaxed"
orientation = "LandscapeButtonsTop"
refresh_policy = "FullEveryTen"
last_refresh = "FastClean"

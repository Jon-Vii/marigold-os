# A library far larger than one resident window (40 > LIBRARY_WINDOW=16),
# scrolled deep enough to cross several window refills. Proves the cursor
# walks the whole catalog and the rendered window tracks the selection.
[[steps]]
button = "Back"

[[steps]]
library = "Scanned"
count = 40

# Walk 30 books down. On hardware this crosses the resident window twice;
